<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENS Brick Identity - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2">🧱 ENS Brick Identity</h1>
            <p class="text-gray-400">Human-Readable Agent Addressing</p>
            <div class="mt-4 flex justify-center gap-4">
                <span class="px-3 py-1 rounded-full text-sm bg-purple-500/20 text-purple-400">Base Mainnet</span>
            </div>
        </header>

        <div id="connectionStatus" class="card rounded-xl p-4 mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></div>
                    <span id="statusText" class="text-gray-300">Not Connected</span>
                </div>
                <button id="connectBtn" onclick="connectWallet()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg transition">Connect Wallet</button>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">📝 Register Agent</h2>
                <div class="space-y-4">
                    <input type="text" id="agentAddress" placeholder="Agent Address (0x...)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <input type="text" id="ensName" placeholder="ENS Name (e.g., brick.eth)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="registerAgent()" class="w-full py-2 bg-purple-600 hover:bg-purple-700 rounded-lg">Register</button>
                </div>
            </div>

            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">📄 Set Text Records</h2>
                <div class="space-y-4">
                    <input type="text" id="recordKey" placeholder="Record Key (e.g., agent)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <input type="text" id="recordValue" placeholder="Record Value" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="setTextRecord()" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg">Set Record</button>
                </div>
            </div>

            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">🔍 Resolve Agent</h2>
                <div class="space-y-4">
                    <input type="text" id="resolveName" placeholder="ENS Name (e.g., brick.eth)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="resolveAgent()" class="w-full py-2 bg-green-600 hover:bg-green-700 rounded-lg">Resolve</button>
                    <div id="resolveResult" class="hidden bg-white/5 rounded-lg p-4"></div>
                </div>
            </div>

            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">💰 Send Payment</h2>
                <div class="space-y-4">
                    <input type="text" id="paymentAddress" placeholder="Recipient Address" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <input type="number" id="paymentAmount" placeholder="Amount (ETH)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="sendPayment()" class="w-full py-2 bg-orange-600 hover:bg-orange-700 rounded-lg">Send</button>
                </div>
            </div>
        </div>

        <div class="card rounded-xl p-6 mt-8">
            <h2 class="text-xl font-semibold mb-4">📜 Transaction Log</h2>
            <div id="txLog" class="space-y-2 max-h-64 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const ENS_REGISTRY = '0x0000000000000000000000000000000000000000'; // Replace with deployed address
        const ENS_ABI = [
            "function setAddr(bytes32 node, address addr) external",
            "function addr(bytes32 node) external view returns (address)",
            "function setText(bytes32 node, string calldata key, string calldata value) external",
            "function text(bytes32 node, string calldata key) external view returns (string memory)"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('Please install MetaMask!');
                return;
            }
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send('eth_requestAccounts', []);
                signer = await provider.getSigner();
                contract = new ethers.Contract(ENS_REGISTRY, ENS_ABI, signer);
                
                const address = await signer.getAddress();
                document.getElementById('statusDot').className = 'w-3 h-3 rounded-full bg-green-500 pulse';
                document.getElementById('statusText').textContent = `Connected: ${address.slice(0,6)}...${address.slice(-4)}`;
                document.getElementById('connectBtn').textContent = 'Connected';
                document.getElementById('connectBtn').disabled = true;
                log('Connected to wallet: ' + address);
            } catch (err) {
                alert('Connection failed: ' + err.message);
            }
        }

        async function registerAgent() {
            if (!contract) return alert('Connect wallet first!');
            const agent = document.getElementById('agentAddress').value;
            const ensName = document.getElementById('ensName').value;
            if (!agent || !ensName) return alert('Fill all fields!');
            try {
                const node = ethers.namehash(ensName);
                const tx = await contract.setAddr(node, agent);
                log(`Registering ${ensName} -> ${agent}...`);
                await tx.wait();
                log(`✅ Agent registered!`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function setTextRecord() {
            if (!contract) return alert('Connect wallet first!');
            const key = document.getElementById('recordKey').value;
            const value = document.getElementById('recordValue').value;
            if (!key || !value) return alert('Fill all fields!');
            try {
                const node = ethers.namehash('brick.eth');
                const tx = await contract.setText(node, key, value);
                log(`Setting ${key} = ${value}...`);
                await tx.wait();
                log(`✅ Text record set!`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function resolveAgent() {
            if (!contract) return alert('Connect wallet first!');
            const ensName = document.getElementById('resolveName').value;
            if (!ensName) return alert('Enter ENS name!');
            try {
                const node = ethers.namehash(ensName);
                const address = await contract.addr(node);
                const resultDiv = document.getElementById('resolveResult');
                resultDiv.classList.remove('hidden');
                resultDiv.innerHTML = `
                    <div class="flex justify-between"><span>ENS Name:</span><span class="font-bold">${ensName}</span></div>
                    <div class="flex justify-between"><span>Address:</span><span>${address}</span></div>
                `;
                log(`Resolved ${ensName} -> ${address}`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function sendPayment() {
            if (!provider) return alert('Connect wallet first!');
            const to = document.getElementById('paymentAddress').value;
            const amount = parseFloat(document.getElementById('paymentAmount').value);
            if (!to || !amount) return alert('Fill all fields!');
            try {
                const tx = await signer.sendTransaction({
                    to: to,
                    value: ethers.parseEther(amount.toString())
                });
                log(`Sending ${amount} ETH to ${to}...`);
                await tx.wait();
                log(`✅ Payment sent!`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        function log(msg) {
            const logEl = document.getElementById('txLog');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `<div class="text-sm"><span class="text-gray-500">[${time}]</span> ${msg}</div>` + logEl.innerHTML;
        }
    </script>
</body>
</html>
